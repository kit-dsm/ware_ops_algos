model_name: LSBatchingNNFiFo
problem_type: batching
description: >
  Local search batching metaheuristic with Nearest Neighbourhood routing and due date initial batch construction

requirements:
  layout:
    type:
      - conventional
    features:
      - distance_matrix
      - graph
  resources:
    type:
      - any
    features:
      - capacities
      - dimensions_type
  orders:
    type:
      - standard
    features:
      - order_date
  storage:
    type:
      - any
    features:

objective: Distance

implementation:
  class_name: LSBatchingNNFiFo
  routing_class: NearestNeighborRouting
  start_batching_class: FiFoBatching
  type: metaheuristic
