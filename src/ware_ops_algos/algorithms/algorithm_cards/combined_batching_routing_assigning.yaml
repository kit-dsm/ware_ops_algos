model_name: CombinedBatchingRoutingAssigning
problem_type: batching_routing
description: >
  Exact MIP for the joint order batching and picker routing
  problem. Assigns orders to batches and solves routing per
  batch simultaneously using Gurobi.

requirements:
  layout:
    type:
      - any
    features:
      - start_node
      - end_node
      - distance_matrix
      - predecessor_matrix
  resources:
    type:
      - any
    features:
      - capacities
      - dimensions_type
    constraints:
      dimensions_type:
        equals: [items]
  orders:
    type:
      - standard
  storage:
    type:
      - any

objective: Distance

implementation:
  class_name: CombinedBatchingRoutingAssigning
  solver: Gurobi
  type: exact
