model_name: ClarkAndWrightNN
problem_type: batching
description: >
  Batching based on the clark and wright savings heuristic with nearest neighbour routing

requirements:
  layout:
    type:
      - conventional
    features:
      - distance_matrix
      - graph
      - start_node
      - end_node
      - closest_node_to_start
      - min_aisle_position
      - max_aisle_position
  resources:
    type:
      - human
    features:
      - capacities
      - dimensions_type
  orders:
    type:
      - standard
    features:
  storage:
    type:
      - any

objective: Distance

implementation:
  class_name: ClarkAndWrightBatchingNN
  routing_class: NearestNeighborRouting
  type: heuristic
