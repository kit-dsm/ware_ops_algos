model_name: LSBatchingNNDueDate
problem_type: batching
description: >
  Local search batching metaheuristic with Nearest Neighbourhood routing and due date initial batch construction

requirements:
  layout:
    type:
      - any
    features:
      - start_node
      - end_node
      - closest_node_to_start
      - min_aisle_position
      - max_aisle_position
      - distance_matrix
      - predecessor_matrix
  resources:
    type:
      - any
    features:
      - capacities
      - dimensions_type
  orders:
    type:
      - standard
    features:
      - due_date
  storage:
    type:
      - any

objective: Distance

implementation:
  class_name: LSBatchingNNDueDate
  routing_class: NearestNeighborRouting
  start_batching_class: DueDateBatching
  type: metaheuristic
