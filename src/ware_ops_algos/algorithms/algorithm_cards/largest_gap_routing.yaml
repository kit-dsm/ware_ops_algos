model_name: LargestGap
problem_type: routing
description: >
  Implementation of largest gap heuristic

requirements:
  layout:
    type:
      - conventional
    features:
      - start_node
      - end_node
      - closest_node_to_start
      - min_aisle_position
      - max_aisle_position
      - distance_matrix
      - predecessor_matrix
  resources:
    type:
      - human
  orders:
    type:
      - standard
  storage:
    type:
      - any

objective: Distance

implementation:
  class_name: LargestGapRouting
  component_name: LargestGap
  solver:
  type: heuristic
