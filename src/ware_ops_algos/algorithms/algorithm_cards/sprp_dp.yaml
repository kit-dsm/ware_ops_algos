model_name: RatliffRosenthal
problem_type: routing
description: >
  Dynamic programming approach for the single-picker routing
    problem in single-block parallel-aisle warehouses.

requirements:
  layout:
    type:
      - conventional
    features:
      - start_node
      - end_node
      - closest_node_to_start
      - min_aisle_position
      - max_aisle_position
      - n_aisles
      - n_pick_locations
      - dist_aisle
      - dist_pick_locations
      - dist_aisle_location
      - dist_start
      - dist_end
    constraints:
      n_blocks:
        equals: 1
  resources:
    type:
      - any
  orders:
    type:
      - standard
  storage:
    type:
      - any

objective: Distance

implementation:
  class_name: RatliffRosenthal
  solver:
  type: exact