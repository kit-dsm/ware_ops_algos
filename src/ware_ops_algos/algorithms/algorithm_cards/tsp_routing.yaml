model_name: ExactSolving
problem_type: routing
description: >
  Exact TSP-based routing algorithm using Gurobi for order picking,
  minimizing total travel distance.

requirements:
  layout:
    type:
      - any
    features:
      - start_node
      - end_node
      - distance_matrix
      - predecessor_matrix
  resources:
    type:
      - any
  orders:
    type:
      - standard
  storage:
    type:
      - any

objective: Distance

implementation:
  class_name: ExactTSPRoutingDistance
  solver: Gurobi
  type: exact
