model_name: ClosestDepotMaxSharedArticlesSeedBatching
problem_type: batching
description: >
  Seed batching with closest-to-depot seed selection
  and shared articles similarity measure.


requirements:
  layout:
    type:
      - any
    features:
      - distance_matrix
      - start_node
  resources:
    type:
      - any
    features:
      - capacities
      - dimensions_type
  orders:
    type:
      - standard
    features:
  storage:
    type:
      - any

objective: Distance

implementation:
  class_name: ClosestDepotMaxSharedArticlesSeedBatching
  seed_criterion: CLOSEST_TO_DEPOT
  similarity_measure: SHARED_ARTICLES
  type: heuristic
