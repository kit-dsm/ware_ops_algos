configurations:
  # ---- Local search: 3 routings x 3 constructive starts ----
  - name: LSBatchingNNFiFo
    base: LSBatching
    configuration: {routing_class: NearestNeighbourhood, start_batching_class: FiFo}
  - name: LSBatchingNNFiFoOrderNr
    base: LSBatching
    configuration: {routing_class: NearestNeighbourhood, start_batching_class: OrderNrFiFo}
  - name: LSBatchingNNDueDate
    base: LSBatching
    configuration: {routing_class: NearestNeighbourhood, start_batching_class: DueDate}
  - name: LSBatchingRRFiFo
    base: LSBatching
    configuration: {routing_class: RatliffRosenthal, start_batching_class: FiFo}
  - name: LSBatchingRR   # existing name: RR + OrderNrFiFo
    base: LSBatching
    configuration: {routing_class: RatliffRosenthal, start_batching_class: OrderNrFiFo}
  - name: LSBatchingRRDueDate
    base: LSBatching
    configuration: {routing_class: RatliffRosenthal, start_batching_class: DueDate}
  - name: LSBatchingSShapeFiFo
    base: LSBatching
    configuration: {routing_class: SShape, start_batching_class: FiFo}
  - name: LSBatchingSShapeFiFoOrderNr
    base: LSBatching
    configuration: {routing_class: SShape, start_batching_class: OrderNrFiFo}
  - name: LSBatchingSShapeDueDate
    base: LSBatching
    configuration: {routing_class: SShape, start_batching_class: DueDate}

  # ---- Clark & Wright savings: 3 routings ----
  - name: ClarkAndWrightNN
    base: ClarkAndWright
    configuration: {routing_class: NearestNeighbourhood}
  - name: ClarkAndWrightRR
    base: ClarkAndWright
    configuration: {routing_class: RatliffRosenthal}
  - name: ClarkAndWrightSShape
    base: ClarkAndWright
    configuration: {routing_class: SShape}

  # ---- Seed batching ----
  - name: ClosestDepotMinDistanceSeedBatching
    base: SeedBatching
    configuration: {seed_criterion: CLOSEST_TO_DEPOT, similarity_measure: MIN_DISTANCE}
  - name: ClosestDepotMaxSharedArticlesSeedBatching
    base: SeedBatching
    configuration: {seed_criterion: CLOSEST_TO_DEPOT, similarity_measure: SHARED_ARTICLES}
