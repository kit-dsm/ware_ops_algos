model_name: ClarkAndWrightSShape
problem_type: batching
description: >
  Batching based on the clark and wright savings heuristic with sshape routing

requirements:
  layout:
    type:
      - conventional
    features:
      - start_node
      - end_node
      - closest_node_to_start
      - min_aisle_position
      - max_aisle_position
      - distance_matrix
      - predecessor_matrix
  resources:
    type:
      - human
    features:
      - capacities
      - dimensions_type
  orders:
    type:
      - standard
    features:
  storage:
    type:
      - any

objective: Distance

implementation:
  class_name: ClarkAndWrightBatchingSShape
  routing_class: SShapeRouting
  type: heuristic
