model_name: SShape
problem_type: routing
description: >
  S-shape routing heuristic. Traverses aisles in an
  alternating pattern, switching direction at each aisle
  containing picks.

requirements:
  layout:
    type:
      - conventional
    features:
      - start_node
      - end_node
      - closest_node_to_start
      - min_aisle_position
      - max_aisle_position
      - distance_matrix
      - predecessor_matrix
  resources:
    type:
      - human
  orders:
    type:
      - standard
  storage:
    type:
      - any


objective: Distance

implementation:
  class_name: SShape
  solver:
  type: heuristic
