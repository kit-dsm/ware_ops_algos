model_name: LSBatchingRR
problem_type: batching
description: >
  Local search batching metaheuristic with RatliffRosenthal routing and OrderNrFiFo batching.

requirements:
  layout:
    type:
      - conventional
    features:
      - start_node
      - end_node
      - closest_node_to_start
      - min_aisle_position
      - max_aisle_position
      - n_aisles
      - n_pick_locations
      - dist_aisle
      - dist_pick_locations
      - dist_aisle_location
      - dist_start
      - dist_end
    constraints:
      n_blocks:
        equals: 1
  resources:
    type:
      - any
    features:
      - capacities
      - dimensions_type
  articles:
    type:
      - any
    features:
      - article_id
  orders:
    type:
      - standard
    features:
      - order_id
    constraints:
      n_orders:
        greater_than: 1
  storage:
    type:
      - any


objective: Distance

implementation:
  class_name: LSBatchingRR
  routing_class: RatliffRosenthalRouting
  start_batching_class: OrderNrFiFoBatching
  type: metaheuristic
