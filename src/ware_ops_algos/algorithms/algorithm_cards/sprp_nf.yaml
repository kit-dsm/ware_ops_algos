model_name: RatliffRosenthalNF
problem_type: routing
description: >
  Implementation of DP for SPRP with scattered storage

requirements:
  layout:
    type:
      - conventional
    features:
      - start_node
      - end_node
      - closest_node_to_start
      - min_aisle_position
      - max_aisle_position
      - n_pick_locations
      - dist_pick_locations
      - dist_bottom_to_pick_location
      - n_blocks
    constraints:
      n_blocks:
        equals: 1
  resources:
    type:
      - human
    features:
  orders:
    type:
      - standard
    features:
    constraints:
      n_orders:
        greater_than: 0
  storage:
    type:
      - any
    features:
      - x
      - y
objective: Distance

implementation:
  class_name: RatliffRosenthalNF
  solver: Gurobi
  type: exact
